<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Đặt phòng - Khách sạn phong cách</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/Background.css">
    <link rel="stylesheet" href="css/room.css">
    <link rel="stylesheet" href="css/Global.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <section class="room-search-section">
        <div class="room-search-container">
            <div class="room-search-header">
                <h1>ĐẶT PHÒNG TRỰC TUYẾN</h1>
                <p>Trải nghiệm không gian sang trọng và tiện nghi hiện đại</p>
            </div>

            <div class="room-search-box">
                <form id="roomSearchForm" class="room-search-form">
                    <div class="room-search-grid">
                        <div class="room-search-field">
                            <label><i class="fas fa-calendar-alt"></i> Ngày nhận phòng</label>
                            <div class="input-wrapper">
                                <i class="fas fa-calendar-day input-icon-left"></i>
                                <input type="date" name="checkin" class="room-search-input" required>
                            </div>
                        </div>

                        <div class="room-search-field">
                            <label><i class="fas fa-calendar-alt"></i> Ngày trả phòng</label>
                            <div class="input-wrapper">
                                <i class="fas fa-calendar-day input-icon-left"></i>
                                <input type="date" name="checkout" class="room-search-input" required>
                            </div>
                        </div>

                        <div class="room-search-field">
                            <label><i class="fas fa-door-open"></i> Số lượng phòng</label>
                            <div class="input-wrapper">
                                <i class="fas fa-hotel input-icon-left"></i>
                                <select name="rooms" class="room-search-select">
                                    <option value="1">1 phòng</option>
                                    <option value="2">2 phòng</option>
                                    <option value="3">3 phòng</option>
                                    <option value="4">4 phòng</option>
                                    <option value="5">5 phòng</option>
                                </select>
                                <i class="fas fa-chevron-down input-icon-right"></i>
                            </div>
                        </div>

                        <div class="room-search-field">
                            <label><i class="fas fa-users"></i> Số lượng người</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user input-icon-left"></i>
                                <select name="guests" class="room-search-select">
                                    <option value="1">1 người</option>
                                    <option value="2">2 người</option>
                                    <option value="3">3 người</option>
                                    <option value="4">4 người</option>
                                    <option value="5">5 người</option>
                                    <option value="6">6 người</option>
                                    <option value="7">7 người</option>
                                    <option value="8">8 người</option>
                                </select>
                                <i class="fas fa-chevron-down input-icon-right"></i>
                            </div>
                        </div>

                        <div class="room-search-field">
                            <label><i class="fas fa-star"></i> Loại phòng</label>
                            <div class="input-wrapper">
                                <i class="fas fa-crown input-icon-left"></i>
                                <select name="roomType" class="room-search-select">
                                    <option value="all">Tất cả</option>
                                    <option value="Basic">Basic</option>
                                    <option value="Superior">Superior</option>
                                    <option value="Deluxe">Deluxe</option>
                                    <option value="Royal">Royal</option>
                                    <option value="Junior Suite">Junior Suite</option>
                                    <option value="Family Suite">Family Suite</option>
                                </select>
                                <i class="fas fa-chevron-down input-icon-right"></i>
                            </div>
                        </div>

                        <div class="room-search-button-wrapper">
                            <button type="submit" class="room-search-btn">
                                <i class="fas fa-search"></i>
                                <span>Tìm kiếm phòng</span>
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <section id="available-rooms" class="available-room-result">
                <div class="result-header">
                    <h2>Danh sách phòng trống</h2>
                    <p id="result-summary">Hãy chọn ngày để tìm phòng phù hợp với bạn.</p>
                </div>

                <div id="room-result-list" class="room-result-list"></div>

                <div id="booking-action" class="booking-action" style="display:none;">
                    <button id="btn-create-booking" class="confirm-booking-btn">Tạo booking</button>
                </div>
            </section>
        </div>
    </section>

    <script src="js/notifications.js"></script>
    <script src="js/Header.js"></script>
    <script src="js/RoomSearch.js"></script>
    <script>
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                if (typeof initHeader === 'function') initHeader();
                if (typeof initAuth === 'function') initAuth();
            })
            .catch(err => console.error("Lỗi tải header:", err));
    </script>
</body>
</html>
