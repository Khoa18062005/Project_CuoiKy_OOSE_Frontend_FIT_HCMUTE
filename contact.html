<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ - Nhóm phát triển</title>
    <link rel="stylesheet" href="css/Global.css">
    <link rel="stylesheet" href="css/Header.css">
    <link rel="stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="header-placeholder"></div>
    <script src="js/SharedHeader.js"></script>
    <script src="js/notifications.js"></script>

    <main class="contact-main">
        <section class="page-header">
            <div class="header-decor">
                <span class="shape shape-1"></span>
                <span class="shape shape-2"></span>
                <span class="shape shape-3"></span>
                <span class="shape shape-4"></span>
            </div>
            <div class="container">
                <h1>Gặp gỡ Đội ngũ Phát triển</h1>
                <p>Những người đứng sau dự án khách sạn trực tuyến của chúng tôi</p>
            </div>
        </section>

        <section class="team-section">
            <div class="container">
                <div class="team-grid" id="team-grid">
                    <!-- Dữ liệu thành viên sẽ được JavaScript tạo động -->
                </div>
            </div>
        </section>

        <section class="slogan-section">
            <div class="header-decor">
                <span class="shape shape-5"></span>
                <span class="shape shape-6"></span>
            </div>
            <div class="container">
                <p class="slogan-eyebrow">Mây Vàng</p>
                <h2 class="slogan-text">Mỗi chuyến đi là một câu chuyện — <span>hãy để chúng tôi viết tiếp cùng bạn</span></h2>
                <a href="index.html" class="btn-slogan">Khám phá phòng ngay <i class="fas fa-arrow-right"></i></a>
            </div>
        </section>
    </main>

    <script src="js/contact.js"></script>
    <script src="js/Header.js"></script>

</body>

</html>
