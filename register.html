<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Đăng ký tài khoản - Khách sạn phong cách</title>
    <link rel="stylesheet" href="css/Register.css">
    <link rel="stylesheet" href="css/CheckStrongPW.css">
    <link rel="stylesheet" href="css/Background.css">
    <link rel="stylesheet" href="css/Global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-clouds-wrapper">
        <div class="cloud-decor cloud-tl"></div>
        <div class="cloud-decor cloud-bl"></div>
        <div class="cloud-decor cloud-tr"></div>
        <div class="cloud-decor cloud-br"></div>
    </div>
    
    <div class="register-container">
        <div class="register-grid">
            <!-- Cột trái: Form đăng ký -->
            <div class="form-section">
                <h1 class="register-title">REGISTER</h1>

                <form id="registerForm" action="#" method="post">
                    <div class="input-group">
                        <label>Tên đăng nhập</label>
                        <input type="text" id="username" placeholder="Nhập tên đăng nhập" required>
                        <small class="error-msg" id="error-username"></small>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="example@domain.com" required>
                        <small class="error-msg" id="error-email"></small>
                    </div>
                    <div class="input-group">
                        <label>Số điện thoại</label>
                        <input type="tel" id="phone" placeholder="0912 345 678" required>
                        <small class="error-msg" id="error-phone"></small>
                    </div>
                    <div class="input-group">
                        <label>Ngày sinh</label>
                        <input type="date" id="birthday" required>
                    </div>
                    <div class="input-group">
                        <label>Mật khẩu</label>
                        <input type="password" id="regPassword" placeholder="••••••••" required>
                        <div class="password-strength">
                            <div class="strength-bar" id="regStrengthBar"></div>
                            <span class="strength-text" id="regStrengthText"></span>
                        </div>
                        <!-- Gợi ý độ mạnh mật khẩu -->
                        <div class="password-hint" id="passwordHint">
                            <span class="hint-item" data-rule="length">○ Ít nhất 6 ký tự</span>
                            <span class="hint-item" data-rule="uppercase">○ Chữ hoa (A-Z)</span>
                            <span class="hint-item" data-rule="lowercase">○ Chữ thường (a-z)</span>
                            <span class="hint-item" data-rule="number">○ Số (0-9)</span>
                            <span class="hint-item" data-rule="special">○ Ký tự đặc biệt (!@#$%)</span>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Nhập lại mật khẩu</label>
                        <input type="password" id="regConfirmPassword" placeholder="Xác nhận mật khẩu" required>
                        <div class="password-match" id="regMatchMessage"></div>
                    </div>

                    <div class="register-btn-wrapper">
                        <button type="submit" class="register-btn">
                            <span>Đăng ký tài khoản</span>
                            <span>→</span>
                        </button>
                    </div>

                    <div class="login-redirect">
                        Bạn đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
                    </div>
                </form>
            </div>

            <!-- Cột phải: Hình khách sạn -->
            <div class="image-section">
                <div class="hotel-img-frame">
                    <img src="asset/Hotel.png" alt="Khách sạn phong cách" loading="lazy">
                </div>
                <div class="slogan">Chọn chúng tôi, chọn phong cách!</div>
            </div>
        </div>
    </div>

    <script src="js/CheckPW.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/Register.js"></script>
</body>

</html>
