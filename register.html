<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Đăng ký tài khoản - Khách sạn phong cách</title>
    <link rel="stylesheet" href="css/Register.css">
    <link rel="stylesheet" href="css/CheckStrongPW.css">
    <link rel="stylesheet" href="css/Background.css">
    <link rel="stylesheet" href="css/Global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-clouds-wrapper">
        <div class="cloud-decor cloud-tl"></div>
        <div class="cloud-decor cloud-bl"></div>
        <div class="cloud-decor cloud-tr"></div>
        <div class="cloud-decor cloud-br"></div>
    </div>
    
    <div class="register-container">
        <div class="register-grid">
            <!-- Cột trái: Form đăng ký -->
            <div class="form-section">
                <h1 class="register-title">REGISTER</h1>

                <!-- Bước 1: Form đăng ký -->
                <div id="reg-step1">
                <form id="registerForm" action="#" method="post">
                    <div class="input-group">
                        <label>Tên đăng nhập</label>
                        <input type="text" id="username" placeholder="Nhập tên đăng nhập" required>
                        <small class="error-msg" id="error-username"></small>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="example@domain.com" required>
                        <small class="error-msg" id="error-email"></small>
                    </div>
                    <div class="input-group">
                        <label>Số điện thoại</label>
                        <input type="tel" id="phone" placeholder="0912 345 678" required pattern="^[0-9]{10}$" maxlength="10" title="Chỉ nhập số, đúng 10 ký tự" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        <small class="error-msg" id="error-phone"></small>
                    </div>
                    <div class="input-group">
                        <label>Ngày sinh</label>
                        <input type="date" id="birthday" required>
                    </div>
                    <div class="input-group">
                        <label>Mật khẩu</label>
                        <div class="password-input-wrap">
                            <input type="password" id="regPassword" placeholder="••••••••" required>
                            <i class="fas fa-eye-slash toggle-password" data-target="regPassword" style="cursor: pointer;"></i>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar" id="regStrengthBar"></div>
                            <span class="strength-text" id="regStrengthText"></span>
                        </div>
                        <!-- Gợi ý độ mạnh mật khẩu -->
                        <div class="password-hint" id="passwordHint">
                            <span class="hint-item" data-rule="length">○ Ít nhất 6 ký tự</span>
                            <span class="hint-item" data-rule="uppercase">○ Chữ hoa (A-Z)</span>
                            <span class="hint-item" data-rule="lowercase">○ Chữ thường (a-z)</span>
                            <span class="hint-item" data-rule="number">○ Số (0-9)</span>
                            <span class="hint-item" data-rule="special">○ Ký tự đặc biệt (!@#$%)</span>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Nhập lại mật khẩu</label>
                        <div class="password-input-wrap">
                            <input type="password" id="regConfirmPassword" placeholder="Xác nhận mật khẩu" required>
                            <i class="fas fa-eye-slash toggle-password" data-target="regConfirmPassword" style="cursor: pointer;"></i>
                        </div>
                        <div class="password-match" id="regMatchMessage"></div>
                    </div>

                    <div class="register-btn-wrapper">
                        <button type="submit" class="register-btn">
                            <span>Đăng ký tài khoản</span>
                            <span>→</span>
                        </button>
                    </div>
                </form>

                <div class="auth-divider"><span>hoặc</span></div>
                <div id="googleBtn" class="google-btn-container"></div>

                <div class="login-redirect">
                    Bạn đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
                </div>
                </div><!-- /reg-step1 -->

                <!-- Bước 2: Xác thực OTP qua email -->
                <div id="reg-step2" style="display:none;">
                    <p class="reg-otp-desc">Nhập mã OTP gồm 6 số vừa được gửi tới <strong id="otpEmailLabel"></strong></p>
                    <form id="regOtpForm">
                        <div class="input-group">
                            <label>Mã xác thực (OTP)</label>
                            <div class="otp-container">
                                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                            </div>
                            <div class="otp-timer">
                                <span id="otpTimer">03:00</span>
                                <button type="button" id="resendOtp" class="resend-btn" disabled>Gửi lại mã</button>
                            </div>
                        </div>

                        <div class="register-btn-wrapper">
                            <button type="submit" class="register-btn">
                                <span>Xác nhận đăng ký</span>
                                <span>→</span>
                            </button>
                        </div>
                    </form>

                    <div class="login-redirect">
                        <a href="#" id="backToRegStep1">← Quay lại chỉnh sửa thông tin</a>
                    </div>
                </div><!-- /reg-step2 -->
            </div>

            <!-- Cột phải: Hình khách sạn -->
            <div class="image-section">
                <div class="hotel-img-frame">
                    <img src="asset/Hotel.png" alt="Khách sạn phong cách" loading="lazy">
                </div>
                <div class="slogan">Chọn chúng tôi, chọn phong cách!</div>
            </div>
        </div>
    </div>

    <script src="js/CheckPW.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/OTPHandler.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/GoogleAuth.js"></script>
    <script src="js/Register.js"></script>
</body>

</html>
