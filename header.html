<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="css/Header.css">
    <link rel="stylesheet" href="css/Global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Chart.js cho biểu đồ -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>
    <header class="main-header">
        <nav class="navbar">
            <div class="logo">
                <a href="index.html" class="logo-link">
                    <h2>HOTEL<span>STYLE</span></h2>
                </a>
            </div>

            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Trang chủ</a></li>
                <li><a href="room.html">Đặt phòng</a></li>
                <!-- <li><a href="room.html#available-rooms">Phòng trống</a></li> -->
                <li><a href="profile.html">Tài khoản</a></li>
                <li><a href="contact.html">Liên hệ</a></li>
            </ul>

            <div class="nav-right">
                <div class="nav-buttons" id="auth-buttons">
                    <a href="login.html" class="btn-login">Đăng nhập</a>
                    <a href="register.html" class="btn-register-nav">Đăng ký</a>
                </div>

                <div class="user-dropdown" id="user-dropdown" style="display: none;">
                    <button class="user-dropdown-toggle" id="user-dropdown-toggle" type="button">
                        <div class="user-avatar-mini" id="header-avatar-mini">
                            <img id="header-avatar-img" src="asset/default-avatar.png" alt="avatar">
                        </div>
                        <div class="user-meta">
                            <span class="user-greeting">Xin chào</span>
                            <strong id="display-username">User</strong>
                        </div>
                        <span class="dropdown-arrow">▾</span>
                    </button>

                    <div class="user-dropdown-menu" id="user-dropdown-menu">
                        <a href="profile.html" class="dropdown-item">
                            <span class="dropdown-icon"><i class="fas fa-user-circle"></i></span>
                            <span>Hồ sơ cá nhân</span>
                        </a>

                        <a href="profile.html#booking-history-list" class="dropdown-item">
                            <span class="dropdown-icon"><i class="fas fa-book-open"></i></span>
                            <span>Lịch sử đặt phòng</span>
                        </a>

                        <a href="room.html" class="dropdown-item">
                            <span class="dropdown-icon"><i class="fas fa-hotel"></i></span>
                            <span>Đặt phòng ngay</span>
                        </a>

                        <hr class="dropdown-divider"> <button id="logout-btn" class="dropdown-item logout-item"
                            type="button">
                            <span class="dropdown-icon"><i class="fas fa-sign-out-alt"></i></span>
                            <span>Đăng xuất</span>
                        </button>
                    </div>

                    <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" aria-label="Mở menu">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                </div>
        </nav>
    </header>

    <script src="js/Header.js"></script>
</body>

</html>
